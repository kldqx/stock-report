<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGCZ | 彭博级权力地图终端</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* 彭博风格黑金配色 */
        body { background-color: #050505; color: #d1d1d1; font-family: 'Courier New', Courier, monospace; }
        .terminal-header { background: #000; border-bottom: 2px solid #ff9900; }
        .bb-card { background: #0f0f0f; border: 1px solid #333; }
        .bb-card:hover { border-color: #ff9900; background: #1a1a1a; }
        .text-bloomberg-green { color: #00ff00; }
        .text-bloomberg-red { color: #ff3333; }
        .tag-resonance { background: #ff9900; color: #000; font-weight: bold; font-size: 0.65rem; }
    </style>
</head>
<body>
    <div id="app">
        <header class="terminal-header py-6 px-6 mb-8">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold tracking-tighter" style="color: #ff9900;">AGCZ TERMINAL <span class="text-white">DEPLOYED</span></h1>
                    <p class="text-xs opacity-60">F:\AGCZ\MACRO_VAULT\SYNDICATE_READY</p>
                </div>
                <div class="text-right">
                    <div class="text-xs font-bold text-white bg-red-900 px-2 py-1 mb-1">LIVE SIGNAL: 2026-02-24</div>
                    <div class="text-xs opacity-60">5511 STOCKS ANALYZED</div>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-6">
            <div class="grid gap-4">
                <div v-for="s in stocks" :key="s.code" class="bb-card p-5 rounded shadow-2xl flex flex-wrap justify-between items-center">
                    <div class="flex items-center gap-6">
                        <div class="border-r border-gray-800 pr-6">
                            <div class="text-2xl font-bold text-white">{{ s.code }}</div>
                            <div class="text-sm opacity-60">{{ s.name }}</div>
                        </div>
                        <div>
                            <div class="text-xs opacity-40">INTENSITY</div>
                            <div class="text-xl font-bold text-bloomberg-green">{{ s.intensity }}</div>
                        </div>
                        <div>
                            <div class="text-xs opacity-40">SECTOR</div>
                            <div class="text-xl font-bold text-white">{{ s.sector }}</div>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <span v-for="f in s.factors" class="tag-resonance px-2 py-1 rounded">
                            {{ f }}
                        </span>
                    </div>

                    <div class="text-right">
                        <div class="text-xs opacity-40">WHALE ID</div>
                        <div class="text-sm font-bold text-yellow-500">{{ s.whale }}</div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="mt-12 py-6 border-t border-gray-900 text-center text-xs opacity-30">
            BLOOMBERG STYLE DEPLOYMENT | AGCZ MACRO ENGINE v56.2
        </footer>
    </div>

    <script>
        // 🚀 兄弟，金砖就在这儿！手动注入 24 号的黄金数据
        const data = [
            { code: '000002', name: '万 科Ａ', intensity: '15.87', sector: '11(房地产)', whale: 'SOUTHERN B.', factors: ['⚡极强共振', '龙头标杆'] },
            { code: '000021', name: '深科技', intensity: '10.99', sector: '24(算力)', whale: 'XIN YI', factors: ['⚡极强共振', '🍃清爽'] },
            { code: '000070', name: '特发信息', intensity: '11.25', sector: '24(软件)', whale: 'SOUTHERN B.', factors: ['⚡极强共振', '🍃清爽'] },
            { code: '000901', name: '航天科技', intensity: '11.65', sector: '07(航天)', whale: 'SH-FAST', factors: ['📡板块异动', '真点火'] },
            { code: '000078', name: '海王生物', intensity: '11.37', sector: '12(医药)', whale: 'ZHONGGUANCUN', factors: ['📡局部共振', '低位'] }
        ];

        Vue.createApp({
            data() { return { stocks: data } }
        }).mount('#app');
    </script>
</body>
</html>
